name: PR Labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
